---
layout: default
---

<div class="content">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}

    {% if page.image %}
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="photo">
    {% endif %}

    {% if page.quote %}
    <div class="quote-separator"></div>
    <div class="quote-text">"{{ page.quote }}"</div>
    {% if page.quote_author %}
    <div class="quote-author">{{ page.quote_author }}</div>
    {% endif %}
    {% endif %}

    <div class="text-content">
        {{ content }}
    </div>
</div>
