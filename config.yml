backend:
  name: github
  repo: ikkyu2026/rafael-ruiz
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Páginas"
    files:
      - name: "rafael-ruiz"
        label: "Rafael Ruiz"
        file: "_pages/rafael-ruiz.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "string" }
          - { label: "Imagen", name: "image", widget: "image" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/rafael-ruiz/" }
          - { label: "Contenido", name: "body", widget: "markdown" }
      - name: "terapia-individual"
        label: "Terapia Individual"
        file: "_pages/terapia-individual.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "string" }
          - { label: "Imagen", name: "image", widget: "image" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/terapia-individual/" }
          - { label: "Contenido", name: "body", widget: "markdown" }
      - name: "terapia-de-pareja"
        label: "Terapia de Pareja"
        file: "_pages/terapia-de-pareja.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "string" }
          - { label: "Imagen", name: "image", widget: "image" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/terapia-de-pareja/" }
          - { label: "Contenido", name: "body", widget: "markdown" }
      - name: "contacto"
        label: "Contacto"
        file: "_pages/contacto.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "contact" }
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Imagen contacto", name: "contact_image", widget: "image" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/contacto/" }
          - { label: "Contenido", name: "body", widget: "markdown" }
      - name: "laboratorio-de-conciencia"
        label: "Laboratorio de Conciencia"
        file: "_pages/laboratorio-de-conciencia.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "string" }
          - { label: "Imagen", name: "image", widget: "image" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/retiro-conciencia-barcelona-gestalt/" }
          - { label: "Contenido", name: "body", widget: "markdown" }
