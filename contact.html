---
layout: default
---

<div class="content">
    <h1>{{ page.title }}</h1>

    <div class="contact-info">
        <div class="contact-text">
            <div class="text-content">
                {{ content }}
            </div>
        </div>

        {% if page.contact_image %}
        <div class="contact-photo">
            <img src="{{ page.contact_image | relative_url }}" alt="{{ page.title }}" title="{{ page.title }}">
        </div>
        {% endif %}
    </div>
</div>
